<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- daisyUI and tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- googlr fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- font awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
  <title>github issue tracker</title>
</head>

<body class="bg-[#f8fafc]">
  <main>
    <div class="min-h-screen flex justify-center items-center px-4 sm:px-0">
      <fieldset
        class="fieldset bg-white border-base-300 rounded-box w-full max-w-md sm:max-w-lg border p-6 sm:p-8 shadow-xl">
        <div class="flex flex-col items-center mb-6">
          <img src="./assets/github-logo.png" alt="GitHub Logo" class="h-16 w-16 sm:h-20 sm:w-20 mb-4">
          <h2 class="text-xl sm:text-2xl font-semibold text-center">GitHub Issues Tracker</h2>
          <p class="text-sm sm:text-base text-center text-[#64748b]">Sign in to manage your issues</p>
        </div>

        <label class="label">Username</label>
        <input id="user-name" type="text" class="input w-full mb-2" placeholder="Enter Username" />
        <p class="text-sm text-[#4a00ff] mb-4">Default: admin</p>

        <label class="label">Password</label>
        <input id="pass-word" type="password" class="input w-full mb-2" placeholder="Enter Password" />
        <p class="text-sm text-[#4a00ff] mb-4">Default: admin123</p>

        <button onclick="isAdmin()" class="btn btn-primary w-full mt-2 mb-4">Sign In</button>

        <div class="flex items-center gap-2 mb-6">
          <div class="flex-1 border-t border-[#e4e4e7]"></div>
          <p class="text-[#1f2937] text-sm">OR</p>
          <div class="flex-1 border-t border-[#e4e4e7]"></div>
        </div>

        <p class="text-center text-sm text-[#64748b] mb-2">Demo Credentials:</p>

        <div class="px-6 py-4 bg-[#f8fafc] rounded">
          <p class="text-center text-sm sm:text-base text-[#1f2937]"><span class="font-semibold">Username:</span> admin
          </p>
          <p class="text-center text-sm sm:text-base text-[#1f2937]"><span class="font-semibold">Password:</span>
            admin123</p>
        </div>
      </fieldset>
    </div>
  </main>
  <script src="./scripts/login.js"></script>
</body>

</html>
