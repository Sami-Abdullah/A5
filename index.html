<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- daisyUI and tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- googlr fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- font awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
  <title>github issue tracker</title>
</head>

<body class="bg-[#f8fafcFF]">
  <header class="navbar bg-base-100 shadow-sm">
    <div class="w-11/12 mx-auto flex justify-between">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9"><img src="./assets/github-logo.png" alt=""></div>
        <h1 class="hidden sm:block sm:font-semibold md:text-2xl md:font-semibold ">Github Issue Tracker</h1>
      </div>
      <div class="flex gap-4">
        <div>
          <input type="text" placeholder="Search" class="input input-bordered  md:w-auto" />
        </div>
        <div>
          <button class="btn btn-primary"><p class="sm:hidden ">+</p><p class="hidden sm:block ">+New Issue</p></button>
        </div>
      </div>
    </div>
  </header>

  <main class=" max-w-[1100px] h-screen mx-auto my-5 sm:my-14">
    <!-- all, open, close buttons -->
    <section class="flex gap-2 rounded-lg bg-[#ffffffFF] p-6 shadow-xs">
      <button class="btn btn-primary px-9 sm:px-12">All</button>
      <button class="btn text-[#64748bFF] px-9 sm:px-12">Open</button>
      <button class="btn text-[#64748bFF] px-9 sm:px-12">Close</button>
    </section>
    <!-- issue tracker heading -->
    <section class="p-6 flex justify-between">
      <div class="rigt flex  items-center gap-2">
        <div class="p-3 bg-[#ece4ffFF] rounded-full"><img src="./assets/Aperture.png" alt=""></div>
        <div>
          <h2 class="font-semibold"><span>50</span> Issues</h2>
          
          <p class="text-[#64748bFF] hidden sm:block">Track and manage your project issues</p>
        </div>
      </div>
      <div class="left flex gap-4">
        <div class="open flex items-center gap-2">
          <div class="h-3 w-3 bg-[#00a96eFF] rounded-full"></div>
          <p class="font-medium">Open</p>
        </div>
        <div class="close flex items-center gap-2">
          <div class="h-3 w-3 bg-[#a855f7FF] rounded-full"></div>
          <p class="font-medium">Closeed</p>
        </div>
      </div>
    </section>
  </main>
</body>

</html>
