<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- daisyUI and tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- googlr fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- font awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
  <title>github issue tracker</title>
</head>

<body class="bg-[#f8fafc]">
  <main>
    <div class="min-h-screen flex justify-center items-center">
      <fieldset class="fieldset bg-[#ffffff] border-base-300 rounded-box w-[520px] border p-8 shadow-xl">
        <div class="flex flex-col items-center">
          <div>
            <img src="./assets/github-logo.png" alt="" class="">
          </div>
          <div >
            <h2 class="text-2xl font-semibold text-center">GitHub Issues Tracker</h2>
            <p class="text-base text-center text-[#64748b]">Sign in to manage your issues</p>
          </div>
        </div>
        <label class="label">Username</label>
        <input id="user-name" type="text" class="input w-full" placeholder="Enter Username" />
        <p class="text-sm text-[#4a00ff] mb-2">Default: admin</p>
        <label class="label">Password</label>
        <input id="pass-word" type="password" class="input w-full" placeholder="Enter Password" />
        <p class="text-sm text-[#4a00ff] ">Default: admin123</p>

        <button onclick="isAdmin()" class="btn btn-primary mt-4 mb-4">Sign In</button>
        <div class="flex gap-2 mb-6">
          <div class="w-52 border  mt-2 border-t-1 border-r-0 border-l-0 border-b-0 border-[#e4e4e7] "></div>
          <div><p class="text-[#1f2937]">OR</p></div>
          <div class="w-52 border mt-2 border-t-1 border-r-0 border-l-0 border-b-0 border-[#e4e4e7] "></div>
        </div>
        <p class="text-center text-sm text-[#64748b]">
          Demo Credentials:
        </p>
        <div class="px-40 py-6 bg-[#f8fafc]">
          <p class="text-center text-base text-[#1f2937]"><span class="font-semibold ">Username:</span>admin</p>
          <p class="text-center text-base text-[#1f2937]"><span class="font-semibold ">Password:</span>admin123</p>
        </div>
      </fieldset>
    </div>
  </main>
  <script src="./scripts/login.js"></script>
</body>

</html>
