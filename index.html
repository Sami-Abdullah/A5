<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- daisyUI and tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- googlr fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- font awsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
  <title>github issue tracker</title>
</head>

<body class="bg-[#f8fafcFF]">

  <section id="login-page" class="p-5">
    <main>
      <div class="min-h-screen flex justify-center items-center px-4 sm:px-0">
        <fieldset
          class="fieldset bg-white border-base-300 rounded-box w-full max-w-md sm:max-w-lg border p-6 sm:p-8 shadow-xl">
          <div class="flex flex-col items-center mb-6">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="h-16 w-16 sm:h-20 sm:w-20 mb-4">
            <h2 class="text-xl sm:text-2xl font-semibold text-center">GitHub Issues Tracker</h2>
            <p class="text-sm sm:text-base text-center text-[#64748b]">Sign in to manage your issues</p>
          </div>

          <label class="label">Username</label>
          <input id="user-name" type="text" class="input w-full mb-2" placeholder="Enter Username" />
          <p class="text-sm text-[#4a00ff] mb-4">Default: admin</p>

          <label class="label">Password</label>
          <input id="pass-word" type="password" class="input w-full mb-2" placeholder="Enter Password" />
          <p class="text-sm text-[#4a00ff] mb-4">Default: admin123</p>

          <button onclick="isAdmin()" class="btn btn-primary w-full mt-2 mb-4">Sign In</button>

          <div class="flex items-center gap-2 mb-6">
            <div class="flex-1 border-t border-[#e4e4e7]"></div>
            <p class="text-[#1f2937] text-sm">OR</p>
            <div class="flex-1 border-t border-[#e4e4e7]"></div>
          </div>

          <p class="text-center text-sm text-[#64748b] mb-2">Demo Credentials:</p>

          <div class="px-6 py-4 bg-[#f8fafc] rounded">
            <p class="text-center text-sm sm:text-base text-[#1f2937]"><span class="font-semibold">Username:</span>
              admin
            </p>
            <p class="text-center text-sm sm:text-base text-[#1f2937]"><span class="font-semibold">Password:</span>
              admin123</p>
          </div>
        </fieldset>
      </div>
    </main>
  </section>
  <section id="index-page" class="hidden">
    <header class="navbar bg-base-100 shadow-sm">
      <div class="w-11/12 mx-auto flex justify-between">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9"><img src="./assets/github-logo.png" alt=""></div>
          <h1 class="hidden sm:block sm:font-semibold md:text-2xl md:font-semibold ">Github Issue Tracker</h1>
        </div>
        <div class="flex gap-4">
          <div>
            <input id="search-id" type="text" placeholder="Search" class="input input-bordered  md:w-auto" />
          </div>
          <div>
            <button id="search-btn" class="btn btn-primary">
              <p class="sm:hidden ">+</p>
              <p class="hidden sm:block ">+New Issue</p>
            </button>
          </div>
        </div>
      </div>
    </header>
    <dialog id="my_modal_1" class="modal">
      <div id="details" class="modal-box p-8 space-y-4">

      </div>
    </dialog>
    <main class=" max-w-[1100px] min-h-screen mx-auto py-1 sm:mt-14">

      <!-- all, open, close buttons -->
      <section id="buttons" class="flex gap-2 rounded-lg bg-[#ffffffFF] p-6 shadow-xs mb-2">
        <button class="btns btn btn-primary px-9 sm:px-12">All</button>
        <button class="btns btn text-[#64748bFF] px-9 sm:px-12">Open</button>
        <button class="btns btn text-[#64748bFF] px-9 sm:px-12">Close</button>
      </section>

      <!-- issue tracker heading -->
      <section class="bg-[#ffffffFF] p-5 rounded-t-lg shadow-xs flex justify-between border border-[#e4e4e7FF]">
        <div class="rigt flex  items-center gap-2">
          <div class="p-3 bg-[#ece4ffFF] rounded-full"><img src="./assets/Aperture.png" alt=""></div>
          <div>
            <h2 class="font-semibold"><span id="issue-count-id">50</span> Issues</h2>

            <p class="text-[#64748bFF] hidden sm:block">Track and manage your project issues</p>
          </div>
        </div>
        <div class="left flex gap-4">
          <div class="open flex items-center gap-2">
            <div class="h-3 w-3 bg-[#00a96eFF] rounded-full"></div>
            <p class="font-medium">Open</p>
          </div>
          <div class="close flex items-center gap-2">
            <div class="h-3 w-3 bg-[#a855f7FF] rounded-full"></div>
            <p class="font-medium">Closeed</p>
          </div>
        </div>
      </section>
      <section id="loading-animation" class="flex justify-center items-center hidden">
        <span class="loading loading-dots loading-xl"></span>
      </section>
      <!-- issues list section -->
      <section class="bg-[ #fbfbfbFF] shadow-xl rounded-b-lg mb-6">
        <div id="list-section" class="p-6 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 ">
        </div>
      </section>


    </main>

  </section>
  <script src="./scripts/login.js"></script>
  <script src="./scripts/index.js"></script>
</body>

</html>
